name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
          
      - name: Setup build environment
        run: |
          npm install -g eas-cli@latest
          
      - name: Install dependencies
        working-directory: ./JustPerfectSolutionz
        run: npm ci
        
      - name: Build APK (local)
        working-directory: ./JustPerfectSolutionz
        run: |
          npx expo prebuild --clean --no-install
          npx expo build:android --local --release --output app.apk --non-interactive || true
        continue-on-error: true
        
      - name: Generate Release
        uses: actions/create-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perfect-ledger-v2.1.0
          path: |
            JustPerfectSolutionz/app.apk
            JustPerfectSolutionz/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: ignore
